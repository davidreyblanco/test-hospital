});

document.getElementById('countTotal').textContent = DATA.length;

function getRelevanciaClass(r) {
  if (r === 'Alta') return 'relevancia-alta';
  if (r === 'Media') return 'relevancia-media';
  return 'relevancia-baja';
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCards(data) {
  const container = document.getElementById('cardsContainer');
  const empty = document.getElementById('emptyState');

  if (data.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('countVisible').textContent = 0;
    return;
  }
  empty.style.display = 'none';
  document.getElementById('countVisible').textContent = data.length;

  container.innerHTML = data.map((d, i) => {
    const relClass = getRelevanciaClass(d['Relevancia TietAI']);
    return `
    <div class="card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="card-header">
        <span class="session-badge">${esc(d['Sesión'])}</span>
        <span class="empresa-name">${esc(d['Empresa'])}</span>
        <div class="card-summary">
          <span class="dia-chip">${esc(d['Día'])}</span>
          <span class="horario-chip">${esc(d['Horario'])}</span>
          ${d['Ponente'] ? `<span class="ponente-info"><strong>${esc(d['Ponente'])}</strong> · ${esc(d['Cargo'])}</span>` : ''}
        </div>
        <span class="relevancia-badge ${relClass}">${esc(d['Relevancia TietAI'])}</span>
        <span class="expand-icon">▾</span>
      </div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Categoría</span>
            <span class="info-value"><span class="categoria-chip">${esc(d['Categoría'])}</span></span>
          </div>
          <div class="info-item">
            <span class="info-label">Tipo de relación</span>
            <span class="info-value"><span class="tipo-relacion-chip">${esc(d['Tipo de Relación'])}</span></span>
          </div>
          <div class="info-item">
            <span class="info-label">País / Sede</span>
            <span class="info-value">${esc(d['País / Sede'])}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Tamaño</span>
            <span class="info-value">${esc(d['Tamaño'])}</span>
          </div>
          ${d['Título Ponencia'] ? `
          <div class="info-item" style="grid-column: 1/-1">
            <span class="info-label">Título ponencia</span>
            <span class="info-value">${esc(d['Título Ponencia'])}</span>
          </div>` : ''}
        </div>
        ${d['Perfil de Empresa'] ? `
        <div class="perfil-block">
          <div class="block-label">Perfil de empresa</div>
          ${esc(d['Perfil de Empresa'])}
        </div>` : ''}
        ${d['Acción Recomendada'] ? `
        <div class="accion-block">
          <div class="block-label">Acción recomendada</div>
          ${esc(d['Acción Recomendada'])}
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  document.getElementById('card-' + i).classList.toggle('open');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sesion = document.getElementById('filterSesion').value;
  const dia = document.getElementById('filterDia').value;
  const relevancia = document.getElementById('filterRelevancia').value;
  const tipo = document.getElementById('filterTipo').value;

  const filtered = DATA.filter(d => {
    if (sesion && d['Sesión'] !== sesion) return false;
    if (dia && d['Día'] !== dia) return false;
    if (relevancia && d['Relevancia TietAI'] !== relevancia) return false;
    if (tipo && d['Tipo de Relación'] !== tipo) return false;
    if (q) {
      const haystack = [d['Empresa'], d['Ponente'], d['Cargo'], d['Categoría'], d['Perfil de Empresa']].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  renderCards(filtered);
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterSesion').value = '';
  document.getElementById('filterDia').value = '';
  document.getElementById('filterRelevancia').value = '';
  document.getElementById('filterTipo').value = '';
  applyFilters();
}

// Initial render
applyFilters();
