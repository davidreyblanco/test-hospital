<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infors@lud 2026 · Programa Interactivo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f5f8;color:#1a1a2e;min-height:100vh}

header{
  background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 70%,#e84545 100%);
  color:white;padding:20px 32px;display:flex;align-items:center;gap:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3)
}
.logo{font-size:2rem;font-weight:800;letter-spacing:-1px}
.logo span{color:#ff6b35}
.event-info{font-size:.8rem;opacity:.75;margin-top:2px}
.header-badge{
  margin-left:auto;background:rgba(255,107,53,.2);border:1px solid rgba(255,107,53,.5);
  color:#ff6b35;padding:6px 16px;border-radius:20px;font-size:.78rem;font-weight:600;white-space:nowrap
}

.controls{
  background:white;padding:16px 32px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;
  border-bottom:1px solid #e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:100
}
.ctrl-group{display:flex;flex-direction:column;gap:3px}
.ctrl-group label{font-size:.68rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
input[type=text],select{
  border:1.5px solid #dde1e7;border-radius:7px;padding:7px 11px;font-size:.85rem;
  outline:none;transition:border-color .2s,box-shadow .2s;background:#fafafa;color:#1a1a2e
}
input[type=text]{width:240px}
select{min-width:140px;cursor:pointer}
input:focus,select:focus{border-color:#0f3460;box-shadow:0 0 0 3px rgba(15,52,96,.1);background:white}
.btn-reset{
  padding:7px 18px;border-radius:7px;border:none;cursor:pointer;
  background:#e84545;color:white;font-size:.83rem;font-weight:600;transition:background .2s;margin-left:auto
}
.btn-reset:hover{background:#c73434}

.view-toggle{display:flex;gap:6px;margin-left:4px}
.view-btn{
  padding:7px 14px;border-radius:7px;border:1.5px solid #dde1e7;cursor:pointer;
  background:#fafafa;font-size:.8rem;font-weight:600;color:#666;transition:all .15s
}
.view-btn.active{background:#0f3460;color:white;border-color:#0f3460}

.stats{
  padding:8px 32px;background:#f0f3f7;border-bottom:1px solid #e4e8ef;
  font-size:.8rem;color:#666;display:flex;align-items:center;gap:18px
}
.stats strong{color:#0f3460}

/* AGENDA VIEW */
.agenda-day{margin-bottom:28px}
.day-header{
  background:linear-gradient(90deg,#0f3460,#1a5276);color:white;
  padding:10px 24px;border-radius:10px 10px 0 0;font-weight:700;font-size:.95rem;
  display:flex;align-items:center;gap:12px
}
.day-header .day-date{opacity:.7;font-weight:400;font-size:.82rem}

.timeline-row{
  display:grid;gap:0;border-left:3px solid #0f3460;margin-left:20px
}
.time-block{
  display:flex;gap:0;border-bottom:1px solid #e8eaed;
  background:white
}
.time-block:last-child{border-bottom:none;border-radius:0 0 8px 8px}
.time-label{
  width:90px;min-width:90px;padding:12px 10px;text-align:right;
  font-size:.75rem;font-weight:700;color:#0f3460;border-right:1px solid #e8eaed;
  line-height:1.3;display:flex;align-items:flex-start;justify-content:flex-end
}
.sessions-row{display:flex;flex:1;gap:0}
.session-slot{
  flex:1;padding:10px 14px;border-right:1px solid #f0f0f0;cursor:pointer;
  transition:background .15s;position:relative
}
.session-slot:last-child{border-right:none}
.session-slot:hover{background:#f0f4ff}
.session-slot.tipo-debate{border-top:3px solid #e84545}
.session-slot.tipo-tecnologica{border-top:3px solid #0e9aa7}
.session-slot.tipo-comunicaciones{border-top:3px solid #7c3aed}
.session-slot.tipo-medicina{border-top:3px solid #16a34a}
.session-slot.tipo-farmacia{border-top:3px solid #d97706}
.session-slot.tipo-enfermeria{border-top:3px solid #db2777}
.session-slot.tipo-institucional{border-top:3px solid #6366f1}
.session-slot.tipo-clausura{border-top:3px solid #f59e0b}
.session-slot.tipo-innovacion{border-top:3px solid #059669}
.session-slot.tipo-conferencia{border-top:3px solid #8b5cf6}
.slot-sala{font-size:.65rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.slot-title{font-size:.82rem;font-weight:700;color:#1a1a2e;line-height:1.3;margin-bottom:3px}
.slot-subtitle{font-size:.73rem;color:#555;line-height:1.35;margin-bottom:5px}
.slot-modera{font-size:.7rem;color:#0f3460;font-style:italic}
.slot-count{
  display:inline-block;margin-top:4px;background:#f0f4ff;color:#0f3460;
  padding:2px 7px;border-radius:10px;font-size:.68rem;font-weight:600
}
.slot-empty{color:#ccc;font-size:.78rem;font-style:italic;padding:12px 14px}

.break-row{
  background:#fef9ec;padding:8px 24px 8px 112px;
  font-size:.78rem;color:#92400e;font-weight:600;
  border-bottom:1px solid #fde68a;display:flex;align-items:center;gap:8px
}
.break-row::before{content:'☕';font-size:.9rem}

/* CARDS VIEW */
.cards-grid{display:grid;gap:14px;padding:20px 32px}
.card{
  background:white;border-radius:12px;border:1px solid #e8eaed;
  box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden;
  transition:box-shadow .2s,transform .15s;cursor:pointer
}
.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-1px)}
.card-header{
  padding:13px 18px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid #f4f4f4
}
.tipo-badge{
  padding:3px 9px;border-radius:5px;font-size:.68rem;font-weight:700;
  white-space:nowrap;text-transform:uppercase;letter-spacing:.3px
}
.badge-debate{background:#fde8e8;color:#b91c1c}
.badge-tecnologica{background:#e0f7f9;color:#0e7490}
.badge-comunicaciones{background:#ede9fe;color:#6d28d9}
.badge-medicina{background:#dcfce7;color:#166534}
.badge-farmacia{background:#fef3c7;color:#92400e}
.badge-enfermeria{background:#fce7f3;color:#9d174d}
.badge-institucional{background:#e0e7ff;color:#3730a3}
.badge-clausura{background:#fffbeb;color:#92400e}
.badge-innovacion{background:#d1fae5;color:#065f46}
.badge-conferencia{background:#f5f3ff;color:#6d28d9}
.badge-posters{background:#f1f5f9;color:#475569}
.card-title{font-size:.95rem;font-weight:700;color:#1a1a2e;flex:1}
.card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.meta-chip{
  padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600
}
.chip-dia{background:#f0e6ff;color:#7c3aed}
.chip-hora{background:#e0f0ff;color:#0f3460}
.chip-sala-1{background:#fff0f0;color:#b91c1c}
.chip-sala-2{background:#e0f7f9;color:#0e7490}
.chip-sala-3{background:#f3e8ff;color:#7c3aed}
.expand-icon{color:#aaa;font-size:.9rem;transition:transform .2s;margin-left:6px;user-select:none}
.card.open .expand-icon{transform:rotate(180deg);color:#0f3460}
.card-body{display:none;padding:14px 18px}
.card.open .card-body{display:block}
.subtitle-text{font-size:.85rem;color:#333;font-style:italic;margin-bottom:12px;line-height:1.5;
  padding:8px 12px;background:#fafafa;border-radius:6px;border-left:3px solid #0f3460}
.people-section{margin-bottom:10px}
.people-label{font-size:.68rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.person-row{
  display:flex;align-items:flex-start;gap:10px;padding:7px 10px;
  border-radius:7px;margin-bottom:4px;background:#f8f9fa
}
.person-role{
  font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:10px;
  white-space:nowrap;margin-top:1px
}
.role-modera{background:#dbeafe;color:#1e40af}
.role-ponente{background:#dcfce7;color:#166534}
.role-presenta{background:#f3e8ff;color:#7c3aed}
.role-imparte{background:#fce7f3;color:#9d174d}
.role-preside{background:#fef3c7;color:#92400e}
.role-participa{background:#f0fdf4;color:#15803d}
.role-time{background:#f0f4ff;color:#3730a3}
.person-info{flex:1}
.person-name{font-size:.85rem;font-weight:700;color:#1a1a2e}
.person-cargo{font-size:.75rem;color:#555;line-height:1.4}
.person-entidad{font-size:.73rem;color:#0f3460;font-weight:500}
.ponencia-text{font-size:.78rem;color:#333;font-style:italic;margin-top:3px}
.comms-list{margin-top:4px}
.comm-item{
  font-size:.78rem;color:#333;padding:5px 10px;border-radius:5px;
  background:#f8f9fa;margin-bottom:4px;line-height:1.4
}
.comm-item::before{content:'▸ ';color:#0f3460;font-size:.7rem}

.content{padding:20px 32px}
.empty-state{text-align:center;padding:60px;color:#aaa;font-size:.9rem}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  align-items:center;justify-content:center;padding:20px
}
.modal-overlay.open{display:flex}
.modal{
  background:white;border-radius:16px;max-width:680px;width:100%;
  max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)
}
.modal-header{
  padding:20px 24px;border-bottom:1px solid #f0f0f0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  position:sticky;top:0;background:white;z-index:1
}
.modal-close{
  font-size:1.4rem;cursor:pointer;color:#aaa;border:none;background:none;
  padding:0 4px;line-height:1;flex-shrink:0
}
.modal-close:hover{color:#333}
.modal-body{padding:20px 24px}

@media(max-width:640px){
  header,.controls,.stats,.content,.cards-grid{padding-left:16px;padding-right:16px}
  input[type=text]{width:100%}
  .time-label{width:60px;min-width:60px;font-size:.65rem;padding:8px 6px}
  .sessions-row{flex-direction:column}
  .session-slot{border-right:none;border-bottom:1px solid #f0f0f0}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Infors<span>@</span>lud 2026</div>
    <div class="event-info">XXIX Congreso Nacional de Informática de la Salud · 24–26 Marzo · Madrid</div>
  </div>
  <div class="header-badge">#inforsalud26</div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Buscar ponente, empresa o tema</label>
    <input type="text" id="searchInput" placeholder="Ej: IA, Genomcore, Raquel…" oninput="applyFilters()">
  </div>
  <div class="ctrl-group">
    <label>Día</label>
    <select id="filterDia" onchange="applyFilters()">
      <option value="">Todos los días</option>
      <option value="Mar 24/03">Martes 24/03</option>
      <option value="Mie 25/03">Miércoles 25/03</option>
      <option value="Jue 26/03">Jueves 26/03</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Sala</label>
    <select id="filterSala" onchange="applyFilters()">
      <option value="">Todas las salas</option>
      <option value="Sala 1">Sala 1</option>
      <option value="Sala 2">Sala 2</option>
      <option value="Sala 3">Sala 3</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Tipo de sesión</label>
    <select id="filterTipo" onchange="applyFilters()">
      <option value="">Todos los tipos</option>
      <option value="Sesión Debate">Sesiones Debate</option>
      <option value="Sesión Tecnológica">Sesiones Tecnológicas</option>
      <option value="Sesión Comunicaciones">Comunicaciones</option>
      <option value="Sesión Medicina Digital">Medicina Digital</option>
      <option value="Sesión Farmacia Digital">Farmacia Digital</option>
      <option value="Sesión Enfermería Digital">Enfermería Digital</option>
      <option value="Sesión Innovación">Proyectos Innovadores</option>
      <option value="Institucional">Institucional</option>
    </select>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnAgenda" onclick="setView('agenda')">📅 Agenda</button>
    <button class="view-btn" id="btnCards" onclick="setView('cards')">🗂 Tarjetas</button>
  </div>
  <button class="btn-reset" onclick="resetFilters()">✕ Limpiar</button>
</div>

<div class="stats">
  <span>Mostrando <strong id="countVisible">0</strong> de <strong id="countTotal">0</strong> sesiones</span>
  <span>·</span>
  <span style="display:flex;gap:10px;flex-wrap:wrap">
    <span style="color:#b91c1c">■ Debate</span>
    <span style="color:#0e9aa7">■ Tecnológica</span>
    <span style="color:#7c3aed">■ Comunicaciones</span>
    <span style="color:#16a34a">■ Medicina</span>
    <span style="color:#d97706">■ Farmacia</span>
    <span style="color:#db2777">■ Enfermería</span>
  </span>
</div>

<div id="agendaView" class="content"></div>
<div id="cardsView" class="cards-grid" style="display:none"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <div id="modalTitle" style="flex:1"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

const TIPO_CSS = {
  'Sesión Debate': 'debate',
  'Sesión Tecnológica': 'tecnologica',
  'Sesión Comunicaciones': 'comunicaciones',
  'Sesión Medicina Digital': 'medicina',
  'Sesión Farmacia Digital': 'farmacia',
  'Sesión Enfermería Digital': 'enfermeria',
  'Institucional': 'institucional',
  'Clausura': 'clausura',
  'Sesión Innovación': 'innovacion',
  'Conferencia': 'conferencia',
  'Presentación Posters': 'posters'
};

function tipoCss(tipo) {
  for (const [k,v] of Object.entries(TIPO_CSS)) {
    if (tipo && tipo.includes(k.replace('Sesión ',''))) return v;
    if (tipo === k) return v;
  }
  return 'institucional';
}

function salaCss(sala) {
  if (!sala) return '';
  if (sala.includes('1')) return 'chip-sala-1';
  if (sala.includes('2')) return 'chip-sala-2';
  if (sala.includes('3')) return 'chip-sala-3';
  return '';
}

function badgeCss(tipo) {
  const c = tipoCss(tipo);
  return 'tipo-badge badge-' + c;
}

function roleCss(rol) {
  if (!rol) return 'role-ponente';
  const r = rol.toLowerCase();
  if (r.includes('modera')) return 'role-modera';
  if (r.includes('presenta')) return 'role-presenta';
  if (r.includes('imparte')) return 'role-imparte';
  if (r.includes('preside')) return 'role-preside';
  if (r.includes('participa')) return 'role-participa';
  if (r.match(/\d{2}:/)) return 'role-time';
  return 'role-ponente';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let currentView = 'agenda';
let filtered = [...DATA];

document.getElementById('countTotal').textContent = DATA.length;

function setView(v) {
  currentView = v;
  document.getElementById('btnAgenda').classList.toggle('active', v==='agenda');
  document.getElementById('btnCards').classList.toggle('active', v==='cards');
  document.getElementById('agendaView').style.display = v==='agenda' ? '' : 'none';
  document.getElementById('cardsView').style.display = v==='cards' ? 'grid' : 'none';
  render();
}

function matchesSearch(s, q) {
  if (!q) return true;
  const terms = q.toLowerCase().split(' ').filter(Boolean);
  const hay = [
    s.titulo, s.subtitulo, s.tipo,
    ...s.ponentes.map(p => p.nombre + ' ' + p.cargo + ' ' + (p.entidad||'') + ' ' + (p.ponencia||'')),
    ...s.modera.map(p => p.nombre + ' ' + p.cargo + ' ' + (p.entidad||'')),
    ...s.comunicaciones
  ].join(' ').toLowerCase();
  return terms.every(t => hay.includes(t));
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim();
  const dia = document.getElementById('filterDia').value;
  const sala = document.getElementById('filterSala').value;
  const tipo = document.getElementById('filterTipo').value;
  filtered = DATA.filter(s => {
    if (dia && s.dia !== dia) return false;
    if (sala && s.sala !== sala) return false;
    if (tipo && !s.tipo.includes(tipo.replace('Sesión ',''))) return false;
    if (!matchesSearch(s, q)) return false;
    return true;
  });
  document.getElementById('countVisible').textContent = filtered.length;
  render();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterDia').value = '';
  document.getElementById('filterSala').value = '';
  document.getElementById('filterTipo').value = '';
  applyFilters();
}

// ---- AGENDA VIEW ----
const DAYS = ['Mar 24/03','Mie 25/03','Jue 26/03'];
const DAY_LABELS = {
  'Mar 24/03': 'Martes, 24 de marzo de 2026',
  'Mie 25/03': 'Miércoles, 25 de marzo de 2026',
  'Jue 26/03': 'Jueves, 26 de marzo de 2026'
};
const BREAKS = {
  'Mie 25/03': ['11:00–11:30','14:30–16:00','17:30–18:00'],
  'Jue 26/03': ['11:00–11:30','14:30–16:00']
};
const BREAK_LABELS = {
  '11:00–11:30': '☕ Café y Visita Área de Exposiciones (11:00–11:30)',
  '14:30–16:00': '🕐 Descanso (14:30–16:00)',
  '17:30–18:00': '🏛 Visita Área de Exposiciones (17:30–18:00)'
};

function renderAgenda() {
  const container = document.getElementById('agendaView');
  const fIds = new Set(filtered.map(s => s.id));

  const days = DAYS.filter(d => {
    const dia = document.getElementById('filterDia').value;
    return !dia || dia === d;
  });

  let html = '';
  days.forEach(day => {
    const daySessions = DATA.filter(s => s.dia === day);
    if (!daySessions.length) return;

    // Get unique time slots
    const times = [...new Set(daySessions.map(s => s.hora))].sort();
    const salas = ['Sala 1','Sala 2','Sala 3'];

    html += `<div class="agenda-day">
      <div class="day-header">
        <span>${DAY_LABELS[day]}</span>
      </div>
      <div style="background:white;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)">`;

    // Special: Martes 16:00-16:30 recogida
    if (day === 'Mar 24/03') {
      html += `<div class="time-block">
        <div class="time-label">16:00<br>16:30</div>
        <div class="sessions-row">
          <div style="flex:1;padding:10px 14px;font-size:.83rem;color:#555;font-style:italic">Recogida de Documentación</div>
        </div>
      </div>`;
    }

    const breakList = BREAKS[day] || [];
    let renderedBreaks = new Set();

    times.forEach(time => {
      // Insert break before this time if needed
      if (day === 'Mie 25/03' && time === '11:30–13:00' && !renderedBreaks.has('11:00–11:30')) {
        html += `<div class="break-row">Café y Visita Área de Exposiciones — 11:00 a 11:30</div>`;
        renderedBreaks.add('11:00–11:30');
      }
      if (day === 'Mie 25/03' && time === '16:00–17:30' && !renderedBreaks.has('14:30–16:00')) {
        html += `<div class="break-row">Descanso — 14:30 a 16:00</div>`;
        renderedBreaks.add('14:30–16:00');
      }
      if (day === 'Mie 25/03' && time === '18:00–19:30' && !renderedBreaks.has('17:30–18:00')) {
        html += `<div class="break-row">Visita Área de Exposiciones — 17:30 a 18:00</div>`;
        renderedBreaks.add('17:30–18:00');
      }
      if (day === 'Jue 26/03' && time === '11:30–13:00' && !renderedBreaks.has('11:00–11:30')) {
        html += `<div class="break-row">Café y Visita Área de Exposiciones — 11:00 a 11:30</div>`;
        renderedBreaks.add('11:00–11:30');
      }
      if (day === 'Jue 26/03' && time === '16:00–17:30' && !renderedBreaks.has('14:30–16:00')) {
        html += `<div class="break-row">Descanso — 14:30 a 16:00</div>`;
        renderedBreaks.add('14:30–16:00');
      }

      const timeSessions = daySessions.filter(s => s.hora === time);
      const timeLabel = time.replace('–','<br>');

      html += `<div class="time-block"><div class="time-label">${timeLabel}</div><div class="sessions-row">`;

      salas.forEach(sala => {
        const s = timeSessions.find(x => x.sala === sala);
        if (!s) {
          // Check if it's a full-width session
          if (sala === 'Sala 1') {
            const fullWidth = timeSessions.find(x => !x.sala || x.sala === '');
            if (!fullWidth) {
              html += `<div class="slot-empty">—</div>`;
            }
          }
          return;
        }
        const isFiltered = fIds.has(s.id);
        const css = tipoCss(s.tipo);
        const opacity = isFiltered ? '1' : '0.3';
        const modera = s.modera[0];
        const pCount = s.ponentes.length + s.comunicaciones.length;
        html += `<div class="session-slot tipo-${css}" style="opacity:${opacity}" onclick="openModal('${s.id}')">
          <div class="slot-sala">${esc(s.sala)}</div>
          <div class="slot-title">${esc(s.titulo)}</div>
          ${s.subtitulo ? `<div class="slot-subtitle">"${esc(s.subtitulo)}"</div>` : ''}
          ${modera ? `<div class="slot-modera">Modera: ${esc(modera.nombre)}</div>` : ''}
          ${pCount ? `<span class="slot-count">${pCount} ${s.comunicaciones.length ? 'comunicaciones' : 'ponentes'}</span>` : ''}
        </div>`;
      });

      // Handle single-sala sessions (Inauguración, Clausura, etc.)
      if (timeSessions.length === 1 && (timeSessions[0].sala === 'Sala 1' || !timeSessions[0].sala)) {
        // already handled above if sala === 'Sala 1'
      }

      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html || '<div class="empty-state">No hay sesiones con los filtros aplicados.</div>';
}

// ---- CARDS VIEW ----
function renderCards() {
  const container = document.getElementById('cardsView');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No hay sesiones con los filtros aplicados.</div>';
    return;
  }
  container.innerHTML = filtered.map((s,i) => {
    const css = tipoCss(s.tipo);
    const modera = s.modera[0];
    const pCount = s.ponentes.length;
    const cCount = s.comunicaciones.length;
    return `<div class="card" id="card-${i}">
      <div class="card-header" onclick="document.getElementById('card-${i}').classList.toggle('open')">
        <span class="${badgeCss(s.tipo)}">${esc(s.tipo)}</span>
        <span class="card-title">${esc(s.titulo)}</span>
        <div class="card-meta">
          <span class="meta-chip chip-dia">${esc(s.dia)}</span>
          <span class="meta-chip chip-hora">${esc(s.hora)}</span>
          <span class="meta-chip ${salaCss(s.sala)}">${esc(s.sala)}</span>
        </div>
        <span class="expand-icon">▾</span>
      </div>
      <div class="card-body">
        ${s.subtitulo ? `<div class="subtitle-text">"${esc(s.subtitulo)}"</div>` : ''}
        ${s.modera.length ? `<div class="people-section">
          <div class="people-label">Modera</div>
          ${s.modera.map(p => personRow(p, 'Modera')).join('')}
        </div>` : ''}
        ${s.ponentes.length ? `<div class="people-section">
          <div class="people-label">${pCount} Ponente${pCount!==1?'s':''}</div>
          ${s.ponentes.map(p => personRow(p, p.rol||'Ponente')).join('')}
        </div>` : ''}
        ${s.comunicaciones.length ? `<div class="people-section">
          <div class="people-label">${cCount} Comunicación${cCount!==1?'es':''}</div>
          <div class="comms-list">${s.comunicaciones.map(c => `<div class="comm-item">${esc(c)}</div>`).join('')}</div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function personRow(p, rol) {
  return `<div class="person-row">
    <span class="person-role ${roleCss(rol)}">${esc(rol)}</span>
    <div class="person-info">
      <div class="person-name">${esc(p.nombre)}</div>
      ${p.cargo ? `<div class="person-cargo">${esc(p.cargo)}</div>` : ''}
      ${p.entidad ? `<div class="person-entidad">${esc(p.entidad)}</div>` : ''}
      ${p.ponencia ? `<div class="ponencia-text">"${esc(p.ponencia)}"</div>` : ''}
    </div>
  </div>`;
}

// ---- MODAL ----
function openModal(id) {
  const s = DATA.find(x => x.id === id);
  if (!s) return;
  const css = tipoCss(s.tipo);
  const pCount = s.ponentes.length;
  const cCount = s.comunicaciones.length;

  document.getElementById('modalTitle').innerHTML = `
    <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
      <span class="${badgeCss(s.tipo)}">${esc(s.tipo)}</span>
      <span class="meta-chip chip-dia">${esc(s.dia)}</span>
      <span class="meta-chip chip-hora">${esc(s.hora)}</span>
      <span class="meta-chip ${salaCss(s.sala)}">${esc(s.sala)}</span>
    </div>
    <div style="font-size:1.05rem;font-weight:700;margin-top:8px;color:#1a1a2e">${esc(s.titulo)}</div>
  `;

  document.getElementById('modalBody').innerHTML = `
    ${s.subtitulo ? `<div class="subtitle-text">"${esc(s.subtitulo)}"</div>` : ''}
    ${s.modera.length ? `<div class="people-section">
      <div class="people-label">Modera</div>
      ${s.modera.map(p => personRow(p, 'Modera')).join('')}
    </div>` : ''}
    ${pCount ? `<div class="people-section">
      <div class="people-label">${pCount} Ponente${pCount!==1?'s':''}</div>
      ${s.ponentes.map(p => personRow(p, p.rol||'Ponente')).join('')}
    </div>` : ''}
    ${cCount ? `<div class="people-section">
      <div class="people-label">${cCount} Comunicación${cCount!==1?'es':''}</div>
      <div class="comms-list">${s.comunicaciones.map(c => `<div class="comm-item">${esc(c)}</div>`).join('')}</div>
    </div>` : ''}
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalDirect(); });

function render() {
  if (currentView === 'agenda') renderAgenda();
  else renderCards();
}

applyFilters();
