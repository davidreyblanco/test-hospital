<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TietAI · Decisores Administración — Infors@lud 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f7;color:#1a1a2e;min-height:100vh}

header{
  background:linear-gradient(135deg,#0d1b2a 0%,#1b4332 60%,#2d6a4f 100%);
  color:white;padding:22px 32px;display:flex;align-items:center;gap:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.35)
}
.logo{font-size:1.7rem;font-weight:800;letter-spacing:-.5px}
.logo span{color:#52b788}
.logo-sub{font-size:.78rem;opacity:.65;margin-top:2px}
.header-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.event-tag{
  background:rgba(82,183,136,.2);border:1px solid rgba(82,183,136,.45);
  color:#52b788;padding:4px 12px;border-radius:16px;font-size:.75rem;font-weight:600
}
.scope-tag{font-size:.75rem;opacity:.6}

.controls{
  background:white;padding:16px 32px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;
  border-bottom:1px solid #e0e4ea;box-shadow:0 2px 8px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:100
}
.cg{display:flex;flex-direction:column;gap:3px}
.cg label{font-size:.67rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
input[type=text],select{
  border:1.5px solid #dde1e7;border-radius:7px;padding:7px 11px;font-size:.85rem;
  outline:none;transition:border-color .2s,box-shadow .2s;background:#fafafa;color:#1a1a2e
}
input[type=text]{width:240px}
select{min-width:155px;cursor:pointer}
input:focus,select:focus{border-color:#1b4332;box-shadow:0 0 0 3px rgba(27,67,50,.1);background:white}
.btn-reset{
  padding:7px 16px;border-radius:7px;border:none;cursor:pointer;
  background:#e84545;color:white;font-size:.82rem;font-weight:600;
  transition:background .2s;margin-left:auto
}
.btn-reset:hover{background:#c73434}

.stats-bar{
  padding:9px 32px;background:#f7f8fa;border-bottom:1px solid #e4e8ef;
  font-size:.8rem;color:#666;display:flex;align-items:center;gap:18px;flex-wrap:wrap
}
.stats-bar strong{color:#1b4332;font-weight:700}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.leg{display:inline-flex;align-items:center;gap:5px;font-weight:500;font-size:.75rem}
.leg-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.content{padding:20px 32px}
.grid{display:grid;gap:14px}

/* --- CARD --- */
.card{
  background:white;border-radius:12px;border:1px solid #e8eaed;
  box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden;
  transition:box-shadow .2s,transform .15s
}
.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-1px)}

.card-header{
  padding:14px 18px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;
  border-bottom:1px solid #f4f5f7
}

.priority-stripe{
  width:4px;min-width:4px;border-radius:4px;margin-right:2px;align-self:stretch
}
.stripe-muy-alto{background:linear-gradient(180deg,#16a34a,#22c55e)}
.stripe-alto{background:linear-gradient(180deg,#2563eb,#60a5fa)}
.stripe-medio{background:linear-gradient(180deg,#d97706,#fbbf24)}

.avatar{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:700;color:white;flex-shrink:0;
  background:linear-gradient(135deg,#1b4332,#2d6a4f)
}

.card-main{flex:1;min-width:0}
.card-name{font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.card-cargo{font-size:.78rem;color:#555;line-height:1.4;margin-bottom:5px}
.card-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}

.chip{padding:2px 9px;border-radius:12px;font-size:.69rem;font-weight:600;white-space:nowrap}
.chip-org{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.chip-ccaa{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.chip-tipo-estrategico-nacional{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.chip-tipo-estrategico-autonomico{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.chip-tipo-operativo-ti{background:#f0f4ff;color:#3730a3;border:1px solid #c7d2fe}
.chip-tipo-datos-ehds{background:#f0fdf9;color:#065f46;border:1px solid #a7f3d0}
.chip-tipo-innovacion{background:#fdf4ff;color:#7c3aed;border:1px solid #e9d5ff}
.chip-tipo-investigacion{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}

.interes-badge{
  padding:3px 11px;border-radius:20px;font-size:.71rem;font-weight:700;
  white-space:nowrap;flex-shrink:0;align-self:flex-start
}
.interes-muy-alto{background:#dcfce7;color:#166534}
.interes-alto{background:#dbeafe;color:#1e40af}
.interes-medio{background:#fef9c3;color:#854d0e}

.expand-icon{color:#bbb;font-size:.85rem;transition:transform .2s;margin-left:6px;user-select:none;flex-shrink:0;margin-top:2px}
.card.open .expand-icon{transform:rotate(180deg);color:#1b4332}

/* Card body */
.card-body{display:none;padding:16px 18px;border-top:1px solid #f4f5f7}
.card.open .card-body{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.info-block{display:flex;flex-direction:column;gap:4px}
.info-block.full{grid-column:1/-1}
.ib-label{font-size:.67rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ib-text{font-size:.83rem;color:#333;line-height:1.55}

.presencia-block{
  grid-column:1/-1;background:#f0fdf4;border-left:3px solid #22c55e;
  padding:9px 13px;border-radius:0 7px 7px 0;
}
.estrategia-block{
  grid-column:1/-1;background:#fff8f0;border-left:3px solid #f97316;
  padding:9px 13px;border-radius:0 7px 7px 0;
}

.empty-state{text-align:center;padding:60px;color:#aaa;font-size:.9rem;grid-column:1/-1}

@media(max-width:700px){
  header,.controls,.stats-bar,.content{padding-left:16px;padding-right:16px}
  input[type=text]{width:100%}
  .card.open .card-body{grid-template-columns:1fr}
  .presencia-block,.estrategia-block,.info-block.full{grid-column:1}
}
</style>
</head>

// Populate CCAA filter
const ccaas = [...new Set(DATA.map(d=>d.ccaa))].sort((a,b)=>{
  if(a==='Nacional') return -1; if(b==='Nacional') return 1; return a.localeCompare(b,'es');
});
const sel = document.getElementById('fCcaa');
ccaas.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });

function tipoCss(t) {
  if(!t) return '';
  if(t.includes('Estratégico Nacional')) return 'chip-tipo-estrategico-nacional';
  if(t.includes('Estratégico Autonómico')) return 'chip-tipo-estrategico-autonomico';
  if(t.includes('Operativo TI')) return 'chip-tipo-operativo-ti';
  if(t.includes('Datos')) return 'chip-tipo-datos-ehds';
  if(t.includes('Innovación')) return 'chip-tipo-innovacion';
  if(t.includes('Investigación')) return 'chip-tipo-investigacion';
  return '';
}

function interesCss(i) {
  if(i==='Muy Alto') return 'interes-muy-alto';
  if(i==='Alto') return 'interes-alto';
  return 'interes-medio';
}

function stripeCss(i) {
  if(i==='Muy Alto') return 'stripe-muy-alto';
  if(i==='Alto') return 'stripe-alto';
  return 'stripe-medio';
}

function initials(n) {
  return n.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const fi = document.getElementById('fInteres').value;
  const ft = document.getElementById('fTipo').value;
  const fc = document.getElementById('fCcaa').value;

  const filtered = DATA.filter(d => {
    if(fi && d.interes!==fi) return false;
    if(ft && d.tipo_decisor!==ft) return false;
    if(fc && d.ccaa!==fc) return false;
    if(q) {
      const hay = [d.nombre,d.cargo,d.organizacion,d.ccaa,d.tipo_decisor,d.presencia,d.relevancia,d.estrategia].join(' ').toLowerCase();
      if(!q.split(' ').filter(Boolean).every(t=>hay.includes(t))) return false;
    }
    return true;
  });

  document.getElementById('count').textContent = filtered.length;

  const c = document.getElementById('container');
  if(!filtered.length) {
    c.innerHTML = '<div class="empty-state">No se encontraron contactos con los filtros aplicados.</div>';
    return;
  }

  c.innerHTML = filtered.map((d,i) => `
    <div class="card" id="c${i}">
      <div class="card-header" onclick="document.getElementById('c${i}').classList.toggle('open')">
        <div class="priority-stripe ${stripeCss(d.interes)}"></div>
        <div class="avatar">${esc(initials(d.nombre))}</div>
        <div class="card-main">
          <div class="card-name">${esc(d.nombre)}</div>
          <div class="card-cargo">${esc(d.cargo)}</div>
          <div class="card-chips">
            <span class="chip chip-org">${esc(d.organizacion)}</span>
            <span class="chip chip-ccaa">${esc(d.ccaa)}</span>
            <span class="chip ${tipoCss(d.tipo_decisor)}">${esc(d.tipo_decisor)}</span>
          </div>
        </div>
        <span class="interes-badge ${interesCss(d.interes)}">${esc(d.interes)}</span>
        <span class="expand-icon">▾</span>
      </div>
      <div class="card-body">
        <div class="presencia-block">
          <div class="ib-label">Presencia en el congreso</div>
          <div class="ib-text">${esc(d.presencia)}</div>
        </div>
        <div class="info-block full">
          <div class="ib-label">Por qué es relevante para TietAI</div>
          <div class="ib-text">${esc(d.relevancia)}</div>
        </div>
        <div class="estrategia-block">
          <div class="ib-label">Estrategia de acercamiento</div>
          <div class="ib-text">${esc(d.estrategia)}</div>
        </div>
      </div>
    </div>`).join('');
}

function reset() {
  document.getElementById('searchInput').value='';
  document.getElementById('fInteres').value='';
  document.getElementById('fTipo').value='';
  document.getElementById('fCcaa').value='';
  render();
}

render();
</script>
